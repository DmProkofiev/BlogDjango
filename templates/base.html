{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'blog:post_list' %}">Главная</a>
            <a href="{% url 'blog:post_create' %}">Создать Пост</a>
            {% if user.is_authenticated %}
                <span>{{ user.username }}</span>
                <div class="avatar-header">
                    {% if user.avatar %}
                        <img src="{{ user.avatar.url }}" alt="Аватар пользователя" class="avatar">
                    {% endif %}
                </div>
                <a href="{% url 'users:account' %}">Мой профиль</a>
                <a href="{% url 'users:logout' %}">Выйти</a>
            {% else %}
                <a href="{% url 'users:login' %}">Войти</a>
                <a href="{% url 'users:register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main>
        <div class="PageContent">
           {% block content %}

           {% endblock %}
        </div>
    </main>

    <footer>
        <p>Учебный проект: Блог Django</p>
    </footer>
</body>
</html>
